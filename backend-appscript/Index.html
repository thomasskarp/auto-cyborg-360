<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo Oficial</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* --- CUSTOM STYLES --- */
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    
    .nav-card { 
        background: #1e293b; border: 1px solid #334155; border-radius: 16px; cursor: pointer; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        transition: all 0.2s ease-out; overflow: hidden; position: relative; 
    }
    .nav-card:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transform: translateY(-5px); background: #253349; }
    
    .model-thumb { width: 100%; height: 120px; object-fit: cover; border-bottom: 1px solid #334155; }
    .brand-logo { max-height: 80px; max-width: 90%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); transition: transform 0.3s; }
    .nav-card:hover .brand-logo { transform: scale(1.1); }
    
    .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
    .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3); }
    
    .slider-arrow { 
        position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); 
        color: white; border: none; cursor: pointer; padding: 8px 12px; border-radius: 50%; 
        font-size: 14px; z-index: 10; 
    }
    .arrow-left { left: 10px; }
    .arrow-right { right: 10px; }
    
    .loader { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .tab-btn { transition: all 0.3s; }
    .tab-active { background-color: #2563eb; color: white; border-color: #3b82f6; }
    .tab-inactive { background-color: #1e293b; color: #94a3b8; border-color: #334155; }
    
    .modal-arrow { 
        position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); 
        color: white; border: none; padding: 20px; font-size: 30px; cursor: pointer; 
        border-radius: 50%; z-index: 120; 
    }
    .modal-left { left: 20px; }
    .modal-right { right: 20px; }
  </style>
</head>
<body class="min-h-screen pb-10 flex flex-col">

  <header class="py-4 border-b border-slate-800 bg-slate-900/95 backdrop-blur sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
      <div class="relative w-full flex justify-between items-center mb-4 h-10">
          <button id="btn-volver" onclick="navigateBack()" class="hidden bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg border border-slate-700 text-xs font-bold transition flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> <span id="txt-volver">VOLVER</span>
          </button>
          <h1 class="text-2xl font-bold tracking-widest text-white uppercase cursor-pointer hover:text-blue-400 absolute left-1/2 -translate-x-1/2" onclick="navigateHome()">CATÁLOGO OFICIAL</h1>
      </div>
      <div class="flex justify-center gap-3 w-full max-w-md">
        <button onclick="setGlobalFilter('TODO')" id="tab-todo" class="tab-btn tab-active px-6 py-2 rounded-full text-xs font-bold border w-1/3">TODOS</button>
        <button onclick="setGlobalFilter('USADO')" id="tab-usado" class="tab-btn tab-inactive px-6 py-2 rounded-full text-xs font-bold border w-1/3">USADOS</button>
        <button onclick="setGlobalFilter('0KM')" id="tab-okm" class="tab-btn tab-inactive px-6 py-2 rounded-full text-xs font-bold border w-1/3">0KM</button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto px-4 mt-6 w-full">
    
    <div id="pantalla-carga" class="text-center py-20 animate-pulse">
      <i class="fas fa-circle-notch loader text-4xl text-blue-500 mb-4"></i>
      <p id="msg-carga" class="text-slate-400 font-medium">Cargando catálogo...</p>
    </div>

    <div id="vista-marcas" class="hidden animate-fade-in">
      <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-2">
        <h2 class="text-slate-400 text-sm font-bold uppercase">Selecciona una Marca</h2>
        <span id="contador-marcas" class="text-xs text-blue-500 font-bold">...</span>
      </div>
      <div id="grid-marcas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </div>

    <div id="vista-modelos" class="hidden animate-fade-in">
      <div class="flex items-center gap-3 mb-6">
         <div id="logo-marca-header" class="h-10 w-auto"></div>
         <div>
             <h2 id="titulo-marca-sel" class="text-2xl font-bold text-white leading-none"></h2>
             <p class="text-xs text-slate-500">Selecciona el modelo</p>
         </div>
      </div>
      <div id="grid-modelos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="vista-versiones" class="hidden animate-fade-in">
      <div class="mb-6">
         <h2 id="titulo-modelo-sel" class="text-2xl font-bold text-white"></h2>
         <p id="subtitulo-versiones" class="text-xs text-slate-500">Versiones disponibles</p>
      </div>
      <div id="grid-versiones" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10"></div>
    </div>
  </main>

  <div id="modal-visor" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeImageModal()">
    <button class="absolute top-5 right-5 text-white text-5xl font-light z-[130]" onclick="closeImageModal()">×</button>
    <button id="modal-btn-prev" class="modal-arrow modal-left" onclick="event.stopPropagation(); navigateModalImage(-1)"><i class="fas fa-chevron-left"></i></button>
    <button id="modal-btn-next" class="modal-arrow modal-right" onclick="event.stopPropagation(); navigateModalImage(1)"><i class="fas fa-chevron-right"></i></button>
    <img id="imagen-grande" src="" alt="Vehículo ampliado" class="max-h-[90vh] max-w-full object-contain rounded-lg" onclick="event.stopPropagation()">
  </div>

  <script>
    // --- STATE MANAGEMENT ---
    let fullInventory = [];
    let sellerInfo = {}; 
    let brandLogos = {}; 
    
    let activeFilter = 'TODO'; 
    let currentBrand = null;
    let currentModel = null;
    let activeView = 'MARCAS'; 
    
    let sliderStates = {}; 
    let modalCarId = null; 
    let modalCurrentIndex = 0;

    const DEFAULT_PHONE = "5490000000000"; // Placeholder for GitHub

    // --- INITIALIZATION ---
    window.onload = () => {
      google.script.run
        .withSuccessHandler(data => {
          if (data.success) {
            fullInventory = data.data;
            sellerInfo = data.vendedores[0] || { phone: DEFAULT_PHONE }; 
            brandLogos = data.logos || {}; 
            
            // Initialize slider states
            fullInventory.forEach((car, idx) => { 
                car.tempId = idx; 
                sliderStates[idx] = 0; 
            });
            
            navigateHome();
          } else {
            showError(`Server Error: ${data.error}`);
          }
        })
        .withFailureHandler(error => {
            showError(`Connection Failed: ${error.message}`);
        })
        .getCatalogData();
    };

    function showError(msg) {
        document.getElementById('msg-carga').innerHTML = `<span class="text-red-500 font-bold text-lg">⚠️ ${msg}</span><br><br>Por favor, revisa tu hoja de cálculo o despliega una nueva versión.`;
        document.querySelector('.loader').style.display = 'none';
    }

    // --- NAVIGATION LOGIC ---
    function navigateHome() { 
        activeView = 'MARCAS'; 
        currentBrand = null; 
        currentModel = null; 
        updateViews(); 
    }
    
    function navigateBack() {
        if (activeView === 'VERSIONES') { 
            activeView = 'MODELOS'; 
            currentModel = null; 
        } else if (activeView === 'MODELOS') { 
            activeView = 'MARCAS'; 
            currentBrand = null; 
        }
        updateViews();
    }

    function setGlobalFilter(filterType) {
        activeFilter = filterType;
        ['todo', 'usado', 'okm'].forEach(id => {
            document.getElementById(`tab-${id}`).className = (id.toUpperCase() === filterType) 
                ? "tab-btn tab-active px-6 py-2 rounded-full text-xs font-bold border w-1/3"
                : "tab-btn tab-inactive px-6 py-2 rounded-full text-xs font-bold border w-1/3";
        });
        updateViews();
    }

    function updateViews() {
        // Hide all views first
        ['pantalla-carga', 'vista-marcas', 'vista-modelos', 'vista-versiones', 'btn-volver'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });

        // Show relevant view
        if (activeView === 'MARCAS') renderBrandsView();
        else if (activeView === 'MODELOS') renderModelsView();
        else if (activeView === 'VERSIONES') renderVersionsView();
    }

    // --- RENDERERS ---
    function renderBrandsView() {
        const container = document.getElementById('grid-marcas');
        container.innerHTML = '';
        const counts = {};
        
        fullInventory.forEach(car => {
            if (activeFilter !== 'TODO' && car.tipo !== activeFilter) return;
            const brandName = car.marca || "OTROS";
            counts[brandName] = (counts[brandName] || 0) + 1;
        });
        
        const sortedBrands = Object.keys(counts).sort();
        if (sortedBrands.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-10">No hay vehículos disponibles.</div>`;
            return;
        }
        
        sortedBrands.forEach(brand => {
            const key = brand.toLowerCase().trim().replace(/\./g, ""); 
            const logoUrl = brandLogos[key]; 
            const quantity = counts[brand];
            
            const div = document.createElement('div');
            div.className = 'nav-card h-40 p-4 group';
            div.onclick = () => { 
                currentBrand = brand; 
                activeView = 'MODELOS'; 
                updateViews(); 
            };
            
            const imgHtml = logoUrl 
                ? `<img src="${logoUrl}" class="brand-logo mb-2" alt="${brand}">` 
                : `<span class="text-xl font-bold text-slate-300 mb-2">${brand}</span>`;
            
            div.innerHTML = `
                <div class="h-20 flex items-center justify-center w-full">${imgHtml}</div>
                <div class="mt-2 text-center">
                    <div class="text-xs font-bold text-slate-400 group-hover:text-white uppercase">${brand}</div>
                    <div class="text-[10px] text-blue-500 font-bold bg-blue-500/10 inline-block px-2 py-0.5 rounded mt-1">${quantity} u.</div>
                </div>`;
            container.appendChild(div);
        });
        
        document.getElementById('contador-marcas').innerText = `${sortedBrands.length} Marcas`;
        document.getElementById('vista-marcas').classList.remove('hidden');
    }

    function renderModelsView() {
        const container = document.getElementById('grid-modelos');
        container.innerHTML = '';
        document.getElementById('titulo-marca-sel').innerText = currentBrand;
        
        const key = currentBrand.toLowerCase().trim().replace(/\./g, ""); 
        document.getElementById('logo-marca-header').innerHTML = brandLogos[key] 
            ? `<img src="${brandLogos[key]}" class="h-full w-auto object-contain bg-white rounded p-1" alt="${currentBrand}">` 
            : '';

        const modelsMap = {}; 
        fullInventory.forEach(car => {
            if (car.marca !== currentBrand) return;
            if (activeFilter !== 'TODO' && car.tipo !== activeFilter) return;
            
            const modelName = car.modelo_base;
            if (!modelsMap[modelName]) modelsMap[modelName] = { count: 0, photo: null };
            modelsMap[modelName].count++;
            if (!modelsMap[modelName].photo && car.fotos.length > 0) {
                modelsMap[modelName].photo = car.fotos[0];
            }
        });
        
        const sortedModels = Object.keys(modelsMap).sort();
        if (sortedModels.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center text-slate-500">No hay modelos disponibles.</div>`;
        }
        
        sortedModels.forEach(model => {
            const info = modelsMap[model];
            const photoUrl = info.photo || 'https://via.placeholder.com/400x300/1e293b/475569?text=Sin+Foto';
            
            const div = document.createElement('div');
            div.className = 'nav-card p-0 group'; 
            div.onclick = () => { 
                currentModel = model; 
                activeView = 'VERSIONES'; 
                updateViews(); 
            };
            
            div.innerHTML = `
                <img src="${photoUrl}" class="model-thumb group-hover:opacity-90 transition" alt="${model}">
                <div class="p-4 text-center w-full">
                    <h3 class="text-lg font-bold text-white group-hover:text-blue-400">${model}</h3>
                    <span class="text-xs text-slate-500">${info.count} versiones</span>
                </div>`;
            container.appendChild(div);
        });
        
        document.getElementById('btn-volver').classList.remove('hidden');
        document.getElementById('txt-volver').innerText = "MARCAS";
        document.getElementById('vista-modelos').classList.remove('hidden');
    }

    function renderVersionsView() {
        const container = document.getElementById('grid-versiones');
        container.innerHTML = '';
        document.getElementById('titulo-modelo-sel').innerText = `${currentBrand} ${currentModel}`;
        
        const cars = fullInventory.filter(a => 
            a.marca === currentBrand && 
            a.modelo_base === currentModel && 
            (activeFilter === 'TODO' || a.tipo === activeFilter)
        );
        document.getElementById('subtitulo-versiones').innerText = `${cars.length} versiones disponibles`;
        
        cars.forEach(car => {
             const mainPhoto = (car.fotos && car.fotos.length > 0) ? car.fotos[0] : 'https://via.placeholder.com/400x300/1e293b/475569?text=Sin+Foto';
             
             let navigationArrows = '';
             if (car.fotos.length > 1) {
                 navigationArrows = `
                     <button onclick="changeCardImage(${car.tempId}, -1)" class="slider-arrow arrow-left"><i class="fas fa-chevron-left"></i></button>
                     <button onclick="changeCardImage(${car.tempId}, 1)" class="slider-arrow arrow-right"><i class="fas fa-chevron-right"></i></button>`;
             }
             
             const div = document.createElement('div');
             div.className = 'glass-card flex flex-col group';
             div.innerHTML = `
                <div class="relative h-56 bg-slate-800 overflow-hidden">
                    <img id="img-${car.tempId}" src="${mainPhoto}" class="w-full h-full object-cover transition duration-500 hover:scale-105 cursor-zoom-in" onclick="openImageModal(${car.tempId})" alt="${car.titulo}">
                    ${navigationArrows}
                    <div class="absolute top-2 left-2 bg-blue-600/90 px-2 py-1 rounded text-[10px] font-bold text-white uppercase">${car.tipo}</div>
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <h3 class="text-md font-bold text-white mb-1 leading-tight">${car.titulo}</h3>
                    <div class="flex items-center gap-3 text-xs text-slate-400 mb-4 mt-2">
                        <span><i class="fas fa-calendar"></i> ${car.anio}</span>
                        <span><i class="fas fa-tachometer-alt"></i> ${car.km}</span>
                    </div>
                    <div class="mt-auto flex justify-between items-center border-t border-slate-700/50 pt-3 relative z-10">
                        <div class="text-xl font-bold text-green-400">${car.precio}</div>
                        <button onclick="event.stopPropagation(); initiateWhatsAppContact(${car.tempId})" class="bg-green-600 text-white w-12 h-12 rounded-full flex items-center justify-center hover:scale-110 transition shadow-lg relative z-20 cursor-pointer">
                            <i class="fab fa-whatsapp text-2xl"></i>
                        </button>
                    </div>
                </div>`;
             container.appendChild(div);
        });
        
        document.getElementById('btn-volver').classList.remove('hidden');
        document.getElementById('txt-volver').innerText = "MODELOS"; 
        document.getElementById('vista-versiones').classList.remove('hidden');
    }

    // --- INTERACTION HANDLERS ---
    function initiateWhatsAppContact(id) {
        const car = fullInventory.find(a => a.tempId === id);
        if(!car) return;
        const phone = sellerInfo.phone || DEFAULT_PHONE;
        const messageText = `Hola! Me interesa el ${car.titulo} (${car.precio}).`;
        window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(messageText)}`, '_blank');
    }

    // --- IMAGE GALLERY & MODAL LOGIC ---
    function calculateNextImageIndex(car, currentIndex, direction) {
        let newIndex = currentIndex + direction;
        if (newIndex < 0) newIndex = car.fotos.length - 1;
        if (newIndex >= car.fotos.length) newIndex = 0;
        return newIndex;
    }

    function changeCardImage(id, direction) {
        const car = fullInventory.find(a => a.tempId === id);
        if (!car || !car.fotos) return;
        
        const newIndex = calculateNextImageIndex(car, sliderStates[id], direction);
        sliderStates[id] = newIndex;
        document.getElementById(`img-${id}`).src = car.fotos[newIndex];
    }
    
    function openImageModal(id) { 
        modalCarId = id; 
        modalCurrentIndex = sliderStates[id] || 0; 
        const car = fullInventory.find(a => a.tempId === id);
        
        document.getElementById('imagen-grande').src = car.fotos[modalCurrentIndex]; 
        document.getElementById('modal-visor').classList.remove('hidden'); 
    }
    
    function navigateModalImage(direction) { 
        const car = fullInventory.find(a => a.tempId === modalCarId); 
        modalCurrentIndex = calculateNextImageIndex(car, modalCurrentIndex, direction);
        document.getElementById('imagen-grande').src = car.fotos[modalCurrentIndex]; 
    }
    
    function closeImageModal() { 
        document.getElementById('modal-visor').classList.add('hidden'); 
    }
  </script>
</body>
</html>
